name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Test
    # macOS 26 became GA for GitHub-hosted runners on 2026-02-26, so the full
    # package (BetterVoice + BetterVoiceCore, which needs the macOS 26 SDK
    # for FluidAudio/Sparkle/Speech APIs) can build directly on `macos-26`.
    # https://github.blog/changelog/2026-02-26-macos-26-is-now-generally-available-for-github-hosted-runners/
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Pin explicitly rather than "latest-stable" so CI doesn't silently
      # shift SDKs when the runner image's default Xcode changes.
      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      # Package.resolved is gitignored in this repo (see client/.gitignore),
      # so it can't be part of the cache key: key on Package.swift plus the
      # runner OS/Xcode pin instead.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: client/.build
          key: ${{ runner.os }}-xcode26.5-spm-${{ hashFiles('client/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode26.5-spm-

      - name: swift build
        working-directory: client
        run: swift build

      - name: swift test
        working-directory: client
        run: swift test
